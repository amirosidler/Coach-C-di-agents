<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Cédi – Content Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --charcoal: #141414;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --gold: #ff6b1a;
    --gold-light: #ff8845;
    --white: #f5f0e8;
    --muted: #6b6560;
    --green: #4caf7d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,107,26,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    line-height: 1;
  }

  .logo span {
    color: var(--white);
  }

  .tagline {
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-left: auto;
  }

  /* Input Section */
  .input-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, textarea, select {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 12px 14px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--gold);
  }

  select option { background: var(--charcoal); }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .format-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .format-btn {
    background: var(--black);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 10px 8px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    text-transform: uppercase;
  }

  .format-btn:hover { border-color: var(--gold); color: var(--gold); }
  .format-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
  }

  /* Generate Button */
  .generate-btn {
    width: 100%;
    background: var(--gold);
    color: var(--black);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    padding: 18px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
  }

  .generate-btn:hover:not(:disabled) {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--black);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { opacity: 0.7; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output */
  .output-section {
    display: none;
  }

  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .output-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: var(--gold);
  }

  .copy-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-all-btn:hover { border-color: var(--gold); color: var(--gold); }

  .content-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,107,26,0.04);
  }

  .card-type {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .card-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.72rem;
    padding: 5px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em;
  }

  .icon-btn:hover { border-color: var(--gold); color: var(--gold); }
  .icon-btn.copied { border-color: var(--green); color: var(--green); }

  .card-body {
    padding: 20px;
    font-size: 0.9rem;
    line-height: 1.75;
    color: #d4cfc8;
    white-space: pre-wrap;
  }

  .card-body strong {
    color: var(--white);
    font-weight: 600;
  }

  /* Hook highlight */
  .hook-line {
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--white);
    border-left: 3px solid var(--gold);
    padding-left: 14px;
    margin-bottom: 16px;
    font-style: italic;
  }

  /* Error */
  .error-box {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff8080;
    padding: 16px 20px;
    border-radius: 2px;
    font-size: 0.88rem;
    display: none;
  }

  .error-box.visible { display: block; }

  /* Footer */
  .footer-note {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 48px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .field-row { grid-template-columns: 1fr; }
    .format-grid { grid-template-columns: repeat(2, 1fr); }
    .logo { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- API KEY GATE (injected for deployment) -->
  <div id="apiKeyGate" style="background:#1a1a1a;border:1px solid #2a2a2a;padding:20px;margin-bottom:28px;border-radius:2px">
    <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#ff6b1a;margin-bottom:12px;font-weight:500">Anthropic API Key</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." style="flex:1;min-width:220px;background:#0a0a0a;border:1px solid #2a2a2a;color:#f5f0e8;font-family:'DM Sans',sans-serif;font-size:0.88rem;padding:10px 12px;border-radius:2px;outline:none">
      <button onclick="saveApiKey()" style="background:#ff6b1a;color:#0a0a0a;border:none;font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.14em;padding:10px 18px;border-radius:2px;cursor:pointer">SPEICHERN</button>
      <button onclick="clearApiKey()" style="background:transparent;color:#6b6560;border:1px solid #2a2a2a;font-family:'DM Sans',sans-serif;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;padding:10px 14px;border-radius:2px;cursor:pointer">Löschen</button>
    </div>
    <div id="apiKeyStatus" style="margin-top:10px;font-size:0.78rem;color:#6b6560"></div>
    <div style="margin-top:8px;font-size:0.72rem;color:#6b6560;line-height:1.5">Key bleibt nur auf diesem Gerät (localStorage). Wird nie an Coach Cédi oder Dritte gesendet.</div>
  </div>


  <header>
    <div class="logo">Coach <span>Cédi</span></div>
    <div class="tagline">Content Intelligence Agent</div>
  </header>

  <!-- Input -->
  <div class="input-section">
    <div class="section-label">Content generieren</div>

    <div class="field" style="margin-bottom:16px">
      <label>Thema / Idee</label>
      <input type="text" id="topic" placeholder="z.B. Warum Skinny-Fat-Männer keine Diät brauchen..." />
    </div>

    <div class="field-row">
      <div class="field">
        <label>Zielgruppe</label>
        <select id="audience">
          <option value="busy_men">Berufstätige Männer 28–45</option>
          <option value="skinny_fat">Skinny-Fat Männer</option>
          <option value="beginners">Gym-Einsteiger</option>
          <option value="advanced">Fortgeschrittene</option>
        </select>
      </div>
      <div class="field">
        <label>Ton</label>
        <select id="tone">
          <option value="direct">Direkt & motivierend</option>
          <option value="educational">Edukativ & sachlich</option>
          <option value="provocative">Provokativ / Myth-busting</option>
          <option value="personal">Persönlich & nahbar</option>
        </select>
      </div>
    </div>

    <div class="field" style="margin-bottom:20px">
      <label>Kontext / Zusatzinfos (optional)</label>
      <textarea id="context" placeholder="z.B. Ich will zeigen, dass Ausdauer nicht der Feind ist. Referenz: mein eigener Weg..."></textarea>
    </div>

    <div class="field" style="margin-bottom:20px">
      <label>Format auswählen</label>
      <div class="format-grid">
        <button class="format-btn active" data-format="reel">🎬 Reel Script</button>
        <button class="format-btn" data-format="carousel">📱 Carousel</button>
        <button class="format-btn" data-format="caption">✍️ Caption</button>
        <button class="format-btn" data-format="hook">🎣 3× Hooks</button>
        <button class="format-btn" data-format="story">💬 Story-Serie</button>
        <button class="format-btn" data-format="all">⚡ Alles</button>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateContent()">
      <div class="spinner"></div>
      <span class="btn-text">Content generieren</span>
    </button>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Output -->
  <div class="output-section" id="outputSection">
    <div class="output-header">
      <div class="output-title">Generated Content</div>
      <button class="copy-all-btn" onclick="copyAll()">Alles kopieren</button>
    </div>
    <div id="cardsContainer"></div>
  </div>

  <div class="footer-note">Coach Cédi · Content Intelligence · Powered by Claude AI</div>
</div>

<script>
  
  // --- API Key Management (injected) ---
  const API_KEY_STORAGE = 'coach_cedi_anthropic_key';

  function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ''; }

  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val.startsWith('sk-ant-')) {
      document.getElementById('apiKeyStatus').textContent = 'Ungültiger Key (muss mit sk-ant- beginnen).';
      document.getElementById('apiKeyStatus').style.color = '#ff8080';
      return;
    }
    localStorage.setItem(API_KEY_STORAGE, val);
    document.getElementById('apiKeyInput').value = '••••••••••••••••' + val.slice(-6);
    document.getElementById('apiKeyStatus').textContent = 'Key gespeichert. Du kannst jetzt generieren.';
    document.getElementById('apiKeyStatus').style.color = '#4caf7d';
  }

  function clearApiKey() {
    localStorage.removeItem(API_KEY_STORAGE);
    document.getElementById('apiKeyInput').value = '';
    document.getElementById('apiKeyStatus').textContent = 'Key gelöscht.';
    document.getElementById('apiKeyStatus').style.color = '#6b6560';
  }

  // On load, check if key exists
  window.addEventListener('DOMContentLoaded', () => {
    const k = getApiKey();
    if (k) {
      document.getElementById('apiKeyInput').value = '••••••••••••••••' + k.slice(-6);
      document.getElementById('apiKeyStatus').textContent = 'Key ist gespeichert. Bereit.';
      document.getElementById('apiKeyStatus').style.color = '#4caf7d';
    } else {
      document.getElementById('apiKeyStatus').textContent = 'Noch kein Key gespeichert. Bitte oben eintragen.';
    }
  });

  // Patch fetch to inject headers for direct browser access
  const _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.includes('api.anthropic.com')) {
      const key = getApiKey();
      if (!key) {
        return Promise.reject(new Error('Kein API-Key gespeichert. Bitte oben eintragen und speichern.'));
      }
      opts = opts || {};
      opts.headers = Object.assign({}, opts.headers || {}, {
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      });
    }
    return _origFetch.call(this, url, opts);
  };
  // --- End API Key Management ---

let selectedFormat = 'reel';
  let lastGeneratedText = '';

  document.querySelectorAll('.format-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFormat = btn.dataset.format;
    });
  });

  const formatLabels = {
    reel: 'Reel Script',
    carousel: 'Carousel Slides',
    caption: 'Post Caption',
    hook: 'Hook Varianten',
    story: 'Story-Serie',
    all: 'Full Content Suite'
  };

  const audienceMap = {
    busy_men: 'berufstätige Männer zwischen 28–45 Jahren, wenig Zeit, hoher Anspruch an Ergebnisse',
    skinny_fat: 'Männer mit Skinny-Fat-Körper (schlank mit Bauchfett, wenig Muskeln)',
    beginners: 'Gym-Einsteiger ohne Erfahrung',
    advanced: 'Fortgeschrittene Kraftsportler'
  };

  const toneMap = {
    direct: 'direkt, selbstbewusst, motivierend – kein Bullshit',
    educational: 'edukativ, sachlich, vertrauenswürdig',
    provocative: 'provokativ, Mythen brechend, aufmerksamkeitsstark',
    personal: 'persönlich, nahbar, authentisch'
  };

  function buildPrompt(topic, audience, tone, context, format) {
    const audienceDesc = audienceMap[audience];
    const toneDesc = toneMap[tone];
    const ctx = context ? `\n\nZusatzkontext vom Coach: ${context}` : '';

    const formatInstructions = {
      reel: `Erstelle ein vollständiges Instagram Reel Script (60–90 Sek. gesprochen) mit:
- Hook (erste 3 Sek. – fesselnd, keine Frage)
- Problem (5–10 Sek.)
- Agitate (10–15 Sek.)
- Solution (20–30 Sek.)
- CTA (5 Sek.)
Formatiere mit klaren Abschnitten. Schreib wie gesprochen, energetisch.`,

      carousel: `Erstelle ein Instagram Carousel mit 7–9 Slides:
- Slide 1: Starker Hook-Titel (max. 8 Wörter)
- Slide 2–7: Je ein klarer Punkt mit Überschrift + 2–3 Sätze Erklärung
- Slide 8: Key Takeaway / Zusammenfassung
- Slide 9: CTA ("Folge Coach Cédi für mehr")
Formatiere mit "SLIDE X:" als Überschrift.`,

      caption: `Erstelle eine Instagram Post Caption (250–400 Wörter):
- Starker erster Satz (Hook – kein Emojis am Anfang)
- Fliesstext, gut lesbar in kurzen Absätzen
- 3–5 relevante Hashtags am Ende
- Klarer CTA`,

      hook: `Erstelle 3 verschiedene starke Hooks für Instagram/Social Media zu diesem Thema.
Jeder Hook: max. 2 Sätze, schockierend oder neugierigmachend.
Nummeriere sie 1–3 und erkläre kurz warum jeder funktioniert.`,

      story: `Erstelle eine Instagram Story-Serie mit 5–6 Slides:
- Story 1: Teaser/Frage
- Story 2–4: Inhalt (kurz, je 1–2 Sätze + Poll/Slider-Idee)
- Story 5: CTA / Link-Sticker-Idee
Jede Story: "STORY X:" als Label.`,

      all: `Erstelle ALLE folgenden Formate nacheinander, klar getrennt mit "=== FORMAT ===" als Trennlinie:
1. REEL SCRIPT (60 Sek.)
2. CAROUSEL (7 Slides)
3. CAPTION (300 Wörter)
4. 3x HOOKS`
    };

    return `Du bist Coach Cédi – ein Fitness- und Life-Coach für berufstätige Männer, spezialisiert auf Körpertransformation ohne Extreme. Deine Brand ist professionell, direkt und authentisch. Du hilfst ${audienceDesc}.

Ton: ${toneDesc}${ctx}

Thema: "${topic}"

${formatInstructions[format]}

Antworte auf Deutsch. Keine Meta-Kommentare, direkt mit dem Content beginnen.`;
  }

  async function generateContent() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) {
      showError('Bitte gib ein Thema ein.');
      return;
    }

    const audience = document.getElementById('audience').value;
    const tone = document.getElementById('tone').value;
    const context = document.getElementById('context').value.trim();

    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    document.getElementById('errorBox').classList.remove('visible');
    document.getElementById('outputSection').classList.remove('visible');
    document.getElementById('cardsContainer').innerHTML = '';

    const prompt = buildPrompt(topic, audience, tone, context, selectedFormat);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const text = data.content.map(b => b.text || '').join('');
      lastGeneratedText = text;

      renderOutput(text, topic);
    } catch (err) {
      showError('Fehler: ' + err.message);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function renderOutput(text, topic) {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = '';

    if (selectedFormat === 'all') {
      // Split by separator
      const sections = text.split(/===\s*[A-Z\s]+===/g).filter(s => s.trim());
      const labels = ['Reel Script', 'Carousel', 'Caption', 'Hooks'];
      sections.forEach((section, i) => {
        createCard(container, labels[i] || 'Content', section.trim(), i * 120);
      });
    } else {
      createCard(container, formatLabels[selectedFormat], text.trim(), 0);
    }

    document.getElementById('outputSection').classList.add('visible');
  }

  function createCard(container, label, content, delay) {
    const card = document.createElement('div');
    card.className = 'content-card';
    card.style.animationDelay = delay + 'ms';

    // Extract first line as hook if reel/caption
    let bodyHtml = '';
    const lines = content.split('\n');
    
    card.innerHTML = `
      <div class="card-header">
        <div class="card-type">${label}</div>
        <div class="card-actions">
          <button class="icon-btn" onclick="copyCard(this, \`${escapeTemplate(content)}\`)">Kopieren</button>
        </div>
      </div>
      <div class="card-body">${formatBody(content)}</div>
    `;

    container.appendChild(card);
  }

  function formatBody(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^(SLIDE \d+:|STORY \d+:|HOOK \d+:|===.*===)/gm, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escapeTemplate(str) {
    return str.replace(/`/g, '\\`').replace(/\$/g, '\\$');
  }

  async function copyCard(btn, text) {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✓ Kopiert';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopieren'; btn.classList.remove('copied'); }, 2000);
  }

  async function copyAll() {
    await navigator.clipboard.writeText(lastGeneratedText);
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = '✓ Alles kopiert';
    setTimeout(() => { btn.textContent = 'Alles kopieren'; }, 2000);
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.add('visible');
  }
</script>
</body>
</html>
